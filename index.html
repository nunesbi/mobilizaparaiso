<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mobiliza Paraíso</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen start active" id="start">
  <div class="center">
    <div class="bus-icon"><img src="bus.svg" alt="ônibus"></div>
    <h1>Mobiliza Paraíso</h1>
    <button class="enter" onclick="openApp()">→</button>
  </div>
</section>

<section class="screen app" id="app">

  <header class="header">
    <div><img src="bus.svg" alt="ônibus" class="header-icon"> Mobiliza Paraíso</div>
    <span class="status online"><span class="dot"></span>Online</span>
  </header>

  <div class="bus-status">Ônibus em rota</div>

  <iframe src="https://thingsboard.cloud/dashboard/33dec660-224d-11f1-9cdc-43ca8fc8dcc9?publicId=73820a50-31e5-11f1-bbfc-9dee6dc65253" id="map" frameborder="0" allowfullscreen></iframe>
  <div class="info-cards">
    <div class="card">
      <p>PRÓXIMO PONTO</p>
      <h3>UFLA Paraíso</h3>
    </div>

    <div class="card">
      <p>TEMPO ESTIMADO</p>
      <h3 class="green">2 min</h3>
    </div>

    <div class="card">
      <p>ÚLTIMA ATUALIZAÇÃO</p>
      <h3 id="time">--:--</h3>
    </div>

    <div class="card">
      <p>VALOR DA TARIFA</p>
      <h3>R$ 3,45</h3>
    </div>
  </div>

  <div class="list">
    <button class="toggle-btn" onclick="toggleList()">Ver próximos pontos</button>

    <ul id="points">
      <li><span>UFLA Paraíso</span><span>2 min</span></li>
      <li><span>Centro</span><span>5 min</span></li>
      <li><span>Rodoviária</span><span>10 min</span></li>
    </ul>
  </div>

</section>

<script>
function openApp(){
  document.getElementById('start').classList.remove('active')
  document.getElementById('app').classList.add('active')
}

function toggleList(){
  document.getElementById('points').classList.toggle('show')
}
</script>

</body>
</html>
